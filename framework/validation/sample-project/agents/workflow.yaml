interface:
  display_name: "四态工作流（样板）"
  short_description: "Dogfood 样板项目的 Codex 工作流入口：四态恢复 + 路由 + 验证 + 回写"
  default_prompt: >-
    按四态工作流处理本任务：先扫描仓库、从 state/ 下的四态系统(LOG/REQUIREMENTS/MEMORY/PROGRESS)
    恢复项目状态，解析权威、路由到合适能力，执行后过 pytest 验证并回写状态，再判断是否交付。
    本样板的流程规范单一真相见 ../../core/*，本入口只负责触发与指路。

# 说明：
# - 本文件用于 Codex 侧 dogfood，与 sample-project/AGENTS.md 配套。
# - 目标是验证 Codex 入口结构能否与 Claude Code 侧跑出一致的四态恢复与交付行为。
